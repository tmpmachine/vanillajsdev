<!DOCTYPE html>
<html lang="en">
<head>
<title>ACE in Action</title>
<style type="text/css" media="screen">
    #editor { 
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
    }
</style>
</head>
<body>

<div id="editor">function foo(items) {
    var x = "All this is syntax highlighted";
    return x;
}</div>
    
<!--<script src="/ace-builds/src-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.22.0/ace.min.js" integrity="sha512-q6CTB0jS+VuJnSct82rVcWlI06LGzNjaG3CWenHWVUncRvc4UQMFkA3a5Ip880xr+lBx38FcHDclOxPdSg+sBw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.22.0/ext-language_tools.min.js" integrity="sha512-6g6cvocV7eT/J8L44lL8gJKqq9onqQeYGgJO0DmrsYFcCfRl6wYkYA/KHS768r4QVTB4JxsCcMQ9gIezxpTCZw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
    var editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.session.setMode("ace/mode/javascript");
    
    editor.setOption('enableLiveAutocompletion', true);
    
    
    // add custom snippets
    
    // Define the snippets
    let snippets = [
      {
        name: 'asd',
        snippet: 'console.log(${1:variable});',
        tabTrigger: 'asd',
        scope: 'javascript'
      },
      {
        name: 'q',
        snippet: 'querySelector(\'${1:variable}\');',
        tabTrigger: 'asd',
        scope: 'javascript'
      },
      {
        name: 'qw',
        snippet: 'document.querySelector(\'${1:variable}\');',
        tabTrigger: 'asd',
        scope: 'javascript'
      },
      {
        name: 'qwe',
        snippet: 'document.querySelectorAll(\'${1:variable}\');',
        tabTrigger: 'asd',
        scope: 'javascript'
      },
      // Add more snippets here
    ];
    
    // Register the snippets with Ace Editor
    ace.require('ace/ext/language_tools').addCompleter({
      getCompletions: function(editor, session, pos, prefix, callback) {
        callback(null, snippets.map(function(snippet) {
          return {
            caption: snippet.name,
            snippet: snippet.snippet,
            meta: 'snippet',
            score: Number.MAX_VALUE
          };
        }));
      }
    });
    
    
    
</script>
</body>
</html>
