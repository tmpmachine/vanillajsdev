<style>
  body{margin:0}
  
  .container-editor {
    display: grid;
    height: 100%;
    grid-template-rows: auto 1fr;
  }
  
  .container-toolbar {
    padding: 0.3rem 0.5rem;
  }
</style>


<div class="container-editor">
  <div class="container-toolbar">
    <button onclick='saveText()'>Save text</button>
    <button onclick='clearSavedText()'>Remove saved text</button>
  </div>
  <div id="editor"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.24.1/ace.js" integrity="sha512-qoTuZAi37gnhWcmNJlzdcWsWlUnI+kWSAd4lGkfNJTPaDKz5JT8buB77B30bTCnX0mdk5tZdvKYZtss+DNgUFQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  let editor = window.ace.edit("editor");
  editor.setTheme("ace/theme/monokai");
  editor.session.setMode("ace/mode/javascript");
  
  
  function saveText() {
    window.localStorage.setItem('saved-text', editor.getValue());
  }
  
  function loadText() {
    let savedText = window.localStorage.getItem('saved-text');
    editor.setValue(savedText);
  }
  
  function clearSavedText() {
    window.localStorage.removeItem('saved-text');
  }
  
  // display saved text on app init
  loadText();
  
</script>
