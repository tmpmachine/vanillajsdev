<style>
  body{margin:0}
  .container-editor {
    display: grid;
    height: 100%;
  }
  .container-toolbar {
    padding: 0.3rem 0.5rem;
  }
</style>

[ .container-editor
  [ #editor]
]


<script> window.asd = console.log; </script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.24.1/ace.js" integrity="sha512-qoTuZAi37gnhWcmNJlzdcWsWlUnI+kWSAd4lGkfNJTPaDKz5JT8buB77B30bTCnX0mdk5tZdvKYZtss+DNgUFQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  
  let editor = window.ace.edit("editor");
  editor.setTheme("ace/theme/monokai");
  editor.session.setMode("ace/mode/javascript");
  
  editor.commands.addCommand({
    name: "cmd-select-more-after",
    bindKey: {win:"Ctrl-D"},
    exec: function(editor) {
      editor.execCommand("selectMoreAfter");
    }
  });
  
</script>
